<app-modal [isOpen]="isOpen" [title]="title" (closed)="onCancel()">
  <div modal-body class="confirm-modal-body flex flex-col items-center gap-4 text-center py-4" style="direction: rtl;">
    <div class="confirm-icon-wrap" [class]="'confirm-icon-wrap--' + type">
      <span *ngIf="type === 'danger'" class="text-2xl">⚠️</span>
      <span *ngIf="type === 'warning'" class="text-2xl">🔔</span>
      <span *ngIf="type === 'success'" class="text-2xl">✅</span>
      <span *ngIf="type === 'info'" class="text-2xl">ℹ️</span>
    </div>
    <div class="confirm-content">
      <h3 class="text-lg font-bold text-gray-900 mb-1" style="font-family: 'Cairo', var(--font-arabic);">{{ title }}</h3>
      <p class="text-sm text-gray-500 leading-relaxed" style="font-family: 'Cairo', var(--font-arabic);">{{ message }}</p>
    </div>
  </div>

  <div modal-footer class="flex justify-center gap-3 w-full" style="direction: rtl;">
    <app-button
      [variant]="type === 'danger' ? 'danger' : 'primary'"
      (click)="onConfirm()"
      class="w-1/2"
    >
      {{ confirmText }}
    </app-button>
    <app-button
      variant="ghost"
      (click)="onCancel()"
      class="w-1/2"
    >
      {{ cancelText }}
    </app-button>
  </div>
</app-modal>
