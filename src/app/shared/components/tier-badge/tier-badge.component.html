<span
  class="inline-flex items-center gap-1 px-2 rounded-full text-xs font-semibold whitespace-nowrap leading-snug py-0.5"
  [style.background-color]="current.bg"
  [style.color]="current.color"
  [attr.aria-label]="current.label + ' tier'"
>
  <span aria-hidden="true">{{ current.icon }}</span>
  <span>{{ current.label }}</span>
</span>
