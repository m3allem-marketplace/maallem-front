<div class="empty-state flex flex-col items-center justify-center p-8 text-center" style="direction: rtl;">
  <div class="empty-state__icon-container flex items-center justify-center w-16 h-16 rounded-full bg-gray-50 text-gray-400 mb-4 border border-dashed border-gray-200">
    <ng-container [ngSwitch]="icon">
      <!-- Search Icon -->
      <svg *ngSwitchCase="'search'" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <!-- Notifications Bell Icon -->
      <svg *ngSwitchCase="'bell'" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
      </svg>
      <!-- Calendar Icon -->
      <svg *ngSwitchCase="'calendar'" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
      <!-- Bid/Time Icon -->
      <svg *ngSwitchCase="'bid'" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>
      </svg>
      <!-- Default Inbox Icon -->
      <svg *ngSwitchDefault width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"></polyline><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path>
      </svg>
    </ng-container>
  </div>

  <h3 class="empty-state__title text-lg font-bold text-gray-800 mb-2" style="font-family: 'Cairo', var(--font-arabic);">{{ title }}</h3>
  <p class="empty-state__description text-sm text-gray-500 max-w-sm mb-6 leading-relaxed" style="font-family: 'Cairo', var(--font-arabic);">{{ description }}</p>

  <app-button *ngIf="actionText" variant="primary" (click)="onActionClick()">
    {{ actionText }}
  </app-button>
</div>
