<span
  [class]="classes"
  [attr.aria-label]="name"
  style="
    background-color: var(--color-primary-subtle);
    color: var(--color-primary);
  "
>

  @if (imageUrl) {

    <img
      [src]="imageUrl"
      [alt]="name"
      class="w-full h-full object-cover"
    />

  } @else {

    <span>
      {{ initials }}
    </span>

  }

</span>
