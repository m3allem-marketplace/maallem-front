<div
  class="worker-card overflow-hidden rounded-xl border border-gray-100 bg-white w-72"
  style="direction: ltr; box-shadow: var(--shadow-sm);"
>

  <!-- Accent bar -->
  <div style="height: 4px; background: linear-gradient(90deg, var(--color-primary), var(--color-accent));"></div>

  <div class="flex flex-col gap-4 p-6">

    <!-- Header -->
    <div class="flex items-start gap-3">
      <div class="shrink-0">
        <app-avatar [imageUrl]="worker.avatar" [name]="worker.name" size="lg" />
      </div>
      <div class="flex flex-col gap-1 min-w-0 flex-1">
        <h3 class="truncate font-bold text-lg" style="color: var(--text-primary);">{{ worker.name }}</h3>
        <p class="text-sm" style="color: var(--text-secondary);">{{ worker.category }}</p>
        <app-tier-badge [tier]="worker.tier" />
      </div>
    </div>

    <!-- Rating -->
    <div class="flex items-center gap-2">
      <app-star-rating [rating]="worker.rating" [readonly]="true" />
      <span class="text-sm" style="color: var(--text-secondary);">({{ worker.rating }})</span>
    </div>

    <!-- Divider -->
    <hr style="border-color: var(--border-color);" />

    <!-- Footer -->
    <div class="flex items-center justify-between gap-4">
      <div class="flex flex-col">
        <span class="text-xs" style="color: var(--text-secondary);">Per Hour</span>
        <span class="text-xl font-bold whitespace-nowrap" style="color: var(--color-primary);">
          {{ worker.ratePerHour | currencyFormat }}
        </span>
      </div>

      <a
        class="btn-cta flex items-center gap-2 px-5 py-2 rounded-full text-sm font-bold whitespace-nowrap shrink-0"
        style="background-color: var(--color-accent); color: var(--color-primary-dark);"
        [routerLink]="['/workers', worker.id]"
      >
        View Profile
        <span class="btn-arrow">→</span>
      </a>
    </div>

  </div>
</div>
