<div class="m-card">
  <div class="m-card__content">
    <div class="m-card__header">
      <div class="m-card__avatar-wrapper">
        <app-avatar [imageUrl]="worker.avatar" [name]="worker.name" size="lg" />
        <div class="m-card__tier-tag">
          <app-tier-badge [tier]="worker.tier" />
        </div>
      </div>
      
      <div class="m-card__info">
        <h3 class="m-card__name">{{ worker.name }}</h3>
        <div class="m-card__cat-wrapper">
          <span class="m-card__cat">{{ worker.category || 'كهربائي' }}</span>
        </div>
      </div>

      <div class="m-card__rating">
        <app-star-rating [rating]="worker.rating" [readonly]="true" />
        <span class="m-card__count">({{ worker.rating || '5' }})</span>
      </div>

      <div class="m-card__meta">
        <span class="m-card__meta-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          <span>القاهرة</span>
        </span>
        <span class="m-card__meta-dot"></span>
        <span class="m-card__meta-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          <span>١٠٠٪ التزام بالمواعيد</span>
        </span>
      </div>
    </div>

    <div class="m-card__footer">
      <div class="m-card__price-wrapper">
        <span class="m-card__amount">{{ worker.ratePerHour | currencyFormat }}</span>
        <span class="m-card__unit">/ساعة</span>
      </div>

      <a [routerLink]="['/workers', worker.id]" class="hero-btn hero-btn--primary">
        <span>عرض الملف الشخصي</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </a>
    </div>
  </div>
</div>
