<div
  dir="rtl"
  class="notification-panel w-[340px] rounded-2xl overflow-hidden arabic-text"
  style="
    background: var(--bg-surface);
    border: 1px solid var(--border-color);
    box-shadow: 0 12px 24px rgba(0,0,0,.08);
    font-family: 'Cairo', var(--font-arabic);
    direction: rtl;
    text-align: right;
  "
>

  <!-- Arrow -->
  <div
    class="absolute -top-2 right-8 w-4 h-4 rotate-45"
    style="
      background: var(--bg-surface);
      border-left: 1px solid var(--border-color);
      border-top: 1px solid var(--border-color);
    "
  ></div>

  <!-- Header -->
  <div
    class="flex items-center justify-between px-4 py-3 border-b"
    style="
      border-color: var(--border-color);
      background: linear-gradient(180deg, rgba(27,43,110,.03), transparent);
    "
  >
    <div class="flex items-center gap-2">
      <h3 class="font-bold text-base" style="color: var(--text-primary);">الإشعارات</h3>
      <span
        class="px-2 py-0.5 rounded-full text-xs font-bold"
        style="background: var(--color-primary-subtle); color: var(--color-primary);"
        *ngIf="unreadCount > 0"
      >
        {{ unreadCount }}
      </span>
    </div>

    <button
      type="button"
      class="clear-btn flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-semibold border-0 outline-none"
      style="background: var(--color-primary-700); color: white;"
      (click)="clearAll()"
      *ngIf="notifications.length > 0"
    >
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/>
      </svg>
      قراءة الكل
    </button>
  </div>

  <!-- Empty State -->
  <div class="py-10 px-6 text-center" *ngIf="notifications.length === 0">
    <div class="text-3xl mb-3">🔔</div>
    <div class="font-semibold" style="color: var(--text-primary);">لقد اطلعت على كل الإشعارات</div>
    <div class="text-sm mt-1" style="color: var(--text-secondary);">لا توجد إشعارات جديدة</div>
  </div>

  <!-- Notifications List -->
  <div class="max-h-[360px] overflow-y-auto" *ngIf="notifications.length > 0">
    <div
      *ngFor="let item of notifications"
      class="notification-item flex gap-3 px-4 py-3"
      [class.unread]="!item.isRead"
      style="border-bottom: 1px solid var(--border-color);"
      (click)="markRead(item.id)"
    >
      <!-- Icon -->
      <div
        class="notification-icon w-9 h-9 rounded-full flex items-center justify-center shrink-0 text-base"
        style="background: var(--color-primary-subtle); color: var(--color-primary);"
      >
        {{ icon(item.type) }}
      </div>

      <!-- Content -->
      <div class="flex-1 min-w-0">
        <p class="text-sm font-bold leading-5 mb-0.5" style="color: var(--text-primary);">
          {{ item.title }}
        </p>
        <p class="text-xs leading-relaxed" style="color: var(--text-secondary);">
          {{ item.body }}
        </p>
      </div>

      <!-- Unread dot -->
      <div
        class="w-2.5 h-2.5 rounded-full self-start mt-1.5 shrink-0"
        style="background: var(--color-primary);"
        *ngIf="!item.isRead"
      ></div>
    </div>
  </div>

</div>
