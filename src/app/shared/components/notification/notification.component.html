<div
  dir="rtl"
  class="notification-panel w-[350px] rounded-3xl overflow-hidden arabic-text"
  style="
    background: var(--bg-surface);
    border: 1px solid rgba(27, 43, 110, 0.06);
    box-shadow: 0 25px 60px -15px rgba(27, 43, 110, 0.18), 0 0 1px 0 rgba(27, 43, 110, 0.15);
    font-family: 'Cairo', var(--font-arabic);
    direction: rtl;
    text-align: right;
  "
>

  <!-- Arrow -->
  <div
    class="absolute -top-2 right-8 w-4 h-4 rotate-45"
    style="
      background: var(--bg-surface);
      border-left: 1px solid rgba(27, 43, 110, 0.06);
      border-top: 1px solid rgba(27, 43, 110, 0.06);
    "
  ></div>

  <!-- Header -->
  <div
    class="flex items-center justify-between px-5 py-4 border-b"
    style="
      border-color: rgba(27, 43, 110, 0.06);
      background: linear-gradient(180deg, rgba(27,43,110,.03), transparent);
    "
  >
    <div class="flex items-center gap-2">
      <h3 class="font-extrabold text-base" style="color: var(--text-primary);">الإشعارات</h3>
      <span
        class="px-2 py-0.5 rounded-full text-[10px] font-bold"
        style="background: var(--color-primary-subtle); color: var(--color-primary);"
        *ngIf="unreadCount > 0"
      >
        {{ unreadCount }}
      </span>
    </div>

    <button
      type="button"
      class="clear-btn flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-[11px] font-bold border-0 outline-none"
      style="background: var(--color-primary-700); color: white;"
      (click)="clearAll()"
      *ngIf="notifications.length > 0"
    >
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/>
      </svg>
      قراءة الكل
    </button>
  </div>

  <!-- Empty State -->
  <div class="py-12 px-6 flex flex-col items-center text-center" *ngIf="notifications.length === 0">
    <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-[#1B2B6E]/5 to-[#1B2B6E]/10 flex items-center justify-center text-[#1B2B6E] mb-4 shadow-sm border border-[#1B2B6E]/5">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="animate-bounce" style="animation-duration: 3s;">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
      </svg>
    </div>
    <div class="font-extrabold text-sm" style="color: var(--text-primary);">لقد اطلعت على كل الإشعارات</div>
    <div class="text-xs mt-1 font-semibold" style="color: var(--text-secondary);">لا توجد إشعارات جديدة في الوقت الحالي</div>
  </div>

  <!-- Notifications List -->
  <div class="max-h-[360px] overflow-y-auto" *ngIf="notifications.length > 0">
    <div
      *ngFor="let item of notifications"
      class="notification-item flex gap-3.5 px-5 py-4"
      [class.unread]="!item.isRead"
      style="border-bottom: 1px solid rgba(27, 43, 110, 0.05);"
      (click)="markRead(item.id)"
    >
      <!-- Icon -->
      <div
        class="notification-icon w-9 h-9 rounded-xl flex items-center justify-center shrink-0"
        [ngClass]="getIconBgClass(item.type)"
      >
        <ng-container [ngSwitch]="item.type">
          <!-- Booking Confirmed -->
          <svg *ngSwitchCase="'BOOKING_CONFIRMED'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          
          <!-- Booking Completed -->
          <svg *ngSwitchCase="'BOOKING_COMPLETED'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
          
          <!-- Booking Cancelled -->
          <svg *ngSwitchCase="'BOOKING_CANCELLED'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
          
          <!-- Bid Received -->
          <svg *ngSwitchCase="'BID_RECEIVED'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
          
          <!-- Bid Accepted -->
          <svg *ngSwitchCase="'BID_ACCEPTED'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
          
          <!-- Bid Rejected -->
          <svg *ngSwitchCase="'BID_REJECTED'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="8" y1="12" x2="16" y2="12"></line></svg>
          
          <!-- Review Received -->
          <svg *ngSwitchCase="'REVIEW_RECEIVED'" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
          
          <!-- Fallback / System / Default -->
          <svg *ngSwitchDefault width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        </ng-container>
      </div>

      <!-- Content -->
      <div class="flex-1 min-w-0">
        <p class="text-[13px] font-bold leading-snug mb-0.5" style="color: var(--text-primary);">
          {{ item.title }}
        </p>
        <p class="text-xs leading-relaxed" style="color: var(--text-secondary);">
          {{ item.body }}
        </p>
      </div>

      <!-- Unread dot -->
      <div
        class="w-2 h-2 rounded-full self-start mt-2 shrink-0"
        style="background: var(--color-primary);"
        *ngIf="!item.isRead"
      ></div>
    </div>
  </div>

</div>
