<div *ngIf="!isWorkspacePage" class="global-ai-container" style="position:fixed;bottom:1.5rem;left:1.5rem;z-index:9999;direction:rtl;">

  <!-- ── FLOATING CHAT WINDOW ── -->
  <div
    *ngIf="isOpen"
    style="
      width:360px;
      height:480px;
      background:#FFFFFF;
      border:1px solid #E8EAF0;
      border-radius:1.25rem;
      box-shadow:0 20px 60px rgba(27,43,110,0.15),0 4px 16px rgba(27,43,110,0.08);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      margin-bottom:0.875rem;
      animation:slideUpChat 0.25s cubic-bezier(0.16,1,0.3,1);
    "
  >

    <!-- Workspace Link Banner -->
    <button
      (click)="navigateToWorkspace()"
      style="
        background:linear-gradient(90deg,#1B2B6E,#2a3f8a);
        color:white;
        padding:0.5rem 1rem;
        font-size:0.7rem;
        font-weight:700;
        border:none;
        cursor:pointer;
        display:flex;
        align-items:center;
        justify-content:space-between;
        width:100%;
        font-family:inherit;
        flex-shrink:0;
        transition:opacity .2s;
      "
      onmouseover="this.style.opacity='0.88'"
      onmouseout="this.style.opacity='1'"
    >
      <span style="line-height: 1.45; text-align: right;">💡 لمشاهدة أرقام ونتائج الحصر وحساب الكميات بالتفصيل، اضغط هنا لفتح اللوحة الكاملة</span>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink: 0; margin-right: 0.5rem;">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <!-- Header -->
    <div style="
      padding:0.875rem 1.125rem;
      border-bottom:1px solid #E8EAF0;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-shrink:0;
      background:#FAFBFE;
    ">
      <div style="display:flex;align-items:center;gap:0.625rem;">
        <div style="width:32px;height:32px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;">
          <img src="assets/ai-avatar.png" style="width:32px;height:32px;object-fit:cover;border-radius:50%;border:2px solid #1B2B6E;box-sizing:border-box;display:block;" alt="AI Avatar">
        </div>
        <div>
          <p style="margin:0;font-size:0.8125rem;font-weight:800;color:#111827;">معلّم الذكي</p>
          <div style="display:flex;align-items:center;gap:0.3rem;margin-top:2px;">
            <span style="width:6px;height:6px;border-radius:50%;background:#10B981;"></span>
            <span style="font-size:0.6rem;font-weight:600;color:#6B7280;">متصل الآن</span>
          </div>
        </div>
      </div>
      <button
        (click)="toggleChat()"
        style="width:28px;height:28px;border-radius:6px;border:1px solid #E8EAF0;background:transparent;color:#9CA3AF;display:flex;align-items:center;justify-content:center;cursor:pointer;"
      >
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Messages Stream -->
    <div
      id="global-chat-viewport"
      style="flex:1;overflow-y:auto;padding:1rem;background:#F4F5F8;display:flex;flex-direction:column;gap:0.875rem;"
    >
      <div
        *ngFor="let msg of messages"
        style="display:flex;width:100%;"
        [style.justifyContent]="msg.sender === 'user' ? 'flex-start' : 'flex-end'"
      >
        <!-- Assistant avatar -->
        <div
          *ngIf="msg.sender === 'assistant'"
          style="width:28px;height:28px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:flex-end;margin-left:0.4rem;"
        >
          <img src="assets/ai-avatar.png" style="width:28px;height:28px;object-fit:cover;border-radius:50%;border:2px solid #1B2B6E;box-sizing:border-box;display:block;" alt="AI Avatar">
        </div>

        <div
          style="max-width:82%;padding:0.75rem 0.875rem;border-radius:1rem;font-size:0.775rem;font-weight:500;line-height:1.65;white-space:pre-wrap;animation:msgIn 0.25s ease;"
          [style.background]="msg.sender === 'user' ? '#1B2B6E' : '#FFFFFF'"
          [style.color]="msg.sender === 'user' ? 'white' : '#111827'"
          [style.borderBottomLeftRadius]="msg.sender === 'user' ? '0.25rem' : '1rem'"
          [style.borderBottomRightRadius]="msg.sender === 'assistant' ? '0.25rem' : '1rem'"
          [style.boxShadow]="'0 1px 4px rgba(27,43,110,0.07)'"
          [style.border]="msg.sender === 'assistant' ? '1px solid #E8EAF0' : 'none'"
        >{{ msg.text }}</div>
      </div>

      <!-- Typing dots -->
      <div *ngIf="loading" style="display:flex;justify-content:flex-end;">
        <div style="width:28px;height:28px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:flex-end;margin-left:0.4rem;">
          <img src="assets/ai-avatar.png" style="width:28px;height:28px;object-fit:cover;border-radius:50%;border:2px solid #1B2B6E;box-sizing:border-box;display:block;" alt="AI Avatar">
        </div>
        <div style="background:#FFFFFF;border:1px solid #E8EAF0;border-radius:1rem;border-bottom-right-radius:0.25rem;padding:0.75rem 1rem;display:flex;align-items:center;gap:0.3rem;box-shadow:0 1px 4px rgba(27,43,110,0.07);">
          <span style="width:6px;height:6px;border-radius:50%;background:#1B2B6E;animation:dotBounce 1.2s infinite;opacity:0.6;animation-delay:0s;"></span>
          <span style="width:6px;height:6px;border-radius:50%;background:#1B2B6E;animation:dotBounce 1.2s infinite;opacity:0.6;animation-delay:0.15s;"></span>
          <span style="width:6px;height:6px;border-radius:50%;background:#1B2B6E;animation:dotBounce 1.2s infinite;opacity:0.6;animation-delay:0.3s;"></span>
        </div>
      </div>
    </div>

    <!-- Input Footer -->
    <div style="
      padding:0.875rem 1rem;
      border-top:1px solid #E8EAF0;
      background:#FFFFFF;
      display:flex;
      align-items:flex-end;
      gap:0.5rem;
      flex-shrink:0;
    ">
      <textarea
        [(ngModel)]="description"
        (keydown.enter)="$event.preventDefault(); sendMessage()"
        placeholder="اكتب استفسارك..."
        [disabled]="loading"
        class="global-chat-input"
      ></textarea>
      <button
        (click)="sendMessage()"
        [disabled]="loading || !description.trim()"
        style="
          width:36px;
          height:36px;
          border-radius:0.625rem;
          background:#1B2B6E;
          border:none;
          color:white;
          display:flex;
          align-items:center;
          justify-content:center;
          cursor:pointer;
          transition:all .2s;
          flex-shrink:0;
        "
        onmouseover="if(!this.disabled)this.style.background='#142258'"
        onmouseout="if(!this.disabled)this.style.background='#1B2B6E'"
      >
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ── FLOATING TRIGGER BUTTON ── -->
  <button
    (click)="toggleChat()"
    title="مساعد معلّم الذكي Q-Scale"
    style="
      width:54px;
      height:54px;
      background:transparent;
      border:none;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      padding:0;
      filter:drop-shadow(0 4px 12px rgba(0,0,0,0.18));
      transition:all .25s cubic-bezier(0.34,1.56,0.64,1);
    "
    onmouseover="this.style.transform='scale(1.08)'"
    onmouseout="this.style.transform='scale(1)'"
  >
    <img *ngIf="!isOpen" src="assets/ai-avatar.png" style="width:54px;height:54px;object-fit:cover;border-radius:50%;border:2.5px solid #1B2B6E;box-sizing:border-box;display:block;" alt="AI Avatar">
    <div *ngIf="isOpen" style="width:44px;height:44px;border-radius:50%;background:#1B2B6E;color:white;display:flex;align-items:center;justify-content:center;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </div>
  </button>

</div>

<style>
@keyframes slideUpChat {
  from { opacity: 0; transform: translateY(12px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes dotBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30%           { transform: translateY(-4px); opacity: 1; }
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
