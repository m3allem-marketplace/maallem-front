<div class="booking-card p-5 bg-white border border-gray-100 rounded-2xl shadow-sm hover:shadow-md hover:border-gray-200 transition-all flex flex-col sm:flex-row sm:items-center justify-between gap-4 text-right cursor-pointer" style="direction: rtl;">
  <div class="flex items-center gap-3">
    <div class="flex items-center justify-center w-12 h-12 rounded-xl text-primary bg-primary-subtle text-xl">
      {{ getCategoryIcon(booking.category) }}
    </div>
    <div class="flex flex-col">
      <h3 class="text-sm font-extrabold text-gray-900 leading-tight" style="font-family: 'Cairo', var(--font-arabic);">{{ booking.title }}</h3>
      <span class="text-xs text-gray-400 mt-1" style="font-family: 'Cairo', var(--font-arabic);">رقم الحجز: {{ booking._id }}</span>
      <span class="text-xs text-gray-600 mt-1" *ngIf="booking.worker" style="font-family: 'Cairo', var(--font-arabic);">الحرفي: {{ booking.worker.name }}</span>
    </div>
  </div>

  <div class="flex items-center gap-4 justify-between sm:justify-end border-t sm:border-t-0 pt-3 sm:pt-0 border-gray-50">
    <div class="flex flex-col text-right">
      <span class="text-xs text-gray-400" style="font-family: 'Cairo', var(--font-arabic);">الميزانية</span>
      <span class="text-sm font-extrabold" style="color: var(--color-primary-700);">{{ booking.budget | currencyFormat }}</span>
    </div>
    <app-status-chip [status]="booking.status" size="sm"></app-status-chip>
  </div>
</div>
