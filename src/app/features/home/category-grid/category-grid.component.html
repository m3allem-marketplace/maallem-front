<section class="cat-section">
  <div class="container">

    <!-- ── Header ── -->
    <div class="cat-header">
      <div class="cat-header__left">
        <span class="cat-tag">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="11" height="11"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
          تصفح التخصصات
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="11" height="11"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </span>
        <h2 class="cat-title">اختار <span class="cat-title__accent">الخدمة</span> اللي تحتاجها</h2>
      </div>
   <a routerLink="/workers" class="cat-cta">
  كل الخدمات

  <span class="cat-cta__arrow">
    <svg
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      width="16"
      height="16"
    >
      <path d="M5 12h14M12 5l7 7-7 7" />
    </svg>
  </span>
</a>
    </div>

    <!-- ── Grid ── -->
    <div
  class="cat-grid"
  *ngIf="categories.length; else skelTpl"
  appClickOutside
  (clickOutside)="activeCategory = null"
>
      <div
        *ngFor="let cat of categories; let i = index"
        class="cat-card"
        [class.cat-card--active]="activeCategory?.id === cat.id"
        [style.animation-delay]="(i * 60) + 'ms'"
        (click)="setActive(cat)"
      >
        <!-- Icon -->
        <div class="cat-card__icon">

          <!-- plumbing -->
          <svg *ngIf="cat.icon === 'plumbing'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="30" height="30">
            <path d="M3 3h5v5H3zM3 8h2v5H3zM5 13h5"/>
            <path d="M10 10h3a3 3 0 0 1 0 6h-3"/>
            <path d="M16.5 5.5L18 4a2 2 0 0 1 2.83 2.83L19.5 8.5l-3-3z"/>
            <path d="M16.5 8.5l-2 2"/>
          </svg>

          <!-- electrical -->
          <svg *ngIf="cat.icon === 'electrical'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="30" height="30">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 7l-4 5h4l-1 5 5-7h-4l1-3z"/>
          </svg>

          <!-- carpentry -->
          <svg *ngIf="cat.icon === 'carpentry'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="30" height="30">
            <path d="M2 6h13v5H2z"/>
            <path d="M15 8h4l3 3v4h-7V8z"/>
            <path d="M5 11v6M9 11v6M2 17h13"/>
            <path d="M18 11v6"/>
          </svg>

          <!-- painting -->
          <svg *ngIf="cat.icon === 'painting'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="30" height="30">
            <rect x="2" y="2" width="15" height="6" rx="2"/>
            <path d="M17 4h1.5a2 2 0 0 1 0 4H17"/>
            <path d="M9 8v4h2v4a2 2 0 0 1-4 0v-4h2V8"/>
            <path d="M4 18h6"/>
          </svg>

          <!-- ac -->
          <svg *ngIf="cat.icon === 'ac'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="30" height="30">
            <rect x="2" y="3" width="20" height="8" rx="2"/>
            <path d="M6 11v4M12 11v6M18 11v4"/>
            <path d="M4 15l2-2 2 2M10 14l2 3 2-3M16 15l2-2 2 2"/>
            <path d="M4 20h5M15 20h5"/>
          </svg>

          <!-- cleaning -->
          <svg *ngIf="cat.icon === 'cleaning'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="30" height="30">
            <path d="M9 2h6l1 5H8L9 2z"/>
            <path d="M8 7h8v9a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2V7z"/>
            <path d="M14 10h3l1 2h-4"/>
            <circle cx="19" cy="5" r="1"/><circle cx="21" cy="8" r="1"/><circle cx="20" cy="11" r="1"/>
          </svg>

          <!-- moving -->
          <svg *ngIf="cat.icon === 'moving'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="30" height="30">
            <rect x="1" y="3" width="15" height="13" rx="1"/>
            <path d="M16 8h4l3 5v5h-7V8z"/>
            <circle cx="5.5" cy="18.5" r="2.5"/>
            <circle cx="18.5" cy="18.5" r="2.5"/>
          </svg>

          <!-- tiling -->
          <svg *ngIf="cat.icon === 'tiling'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="30" height="30">
            <rect x="2" y="2" width="9" height="9" rx="1"/>
            <rect x="13" y="2" width="9" height="9" rx="1"/>
            <rect x="2" y="13" width="9" height="9" rx="1"/>
            <rect x="13" y="13" width="9" height="9" rx="1"/>
          </svg>

          <!-- fallback -->
          <svg *ngIf="!['plumbing','electrical','carpentry','painting','ac','cleaning','moving','tiling'].includes(cat.icon)"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="30" height="30">
            <circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/>
          </svg>

        </div>

        <!-- Content -->
        <div class="cat-card__body">
          <h3 class="cat-card__name">{{ cat.name }}</h3>
          <p class="cat-card__count" *ngIf="cat.subcategories.length">
            {{ cat.subcategories.length }} تخصص
          </p>
        </div>

        <!-- Arrow -->
        <div class="cat-card__arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </div>

        <!-- Subcategories flyout -->
        <div class="cat-card__flyout" *ngIf="cat.subcategories.length && activeCategory?.id === cat.id">
          <div class="cat-card__flyout-inner">
            <button
              *ngFor="let sub of cat.subcategories"
              class="cat-sub"
              (click)="$event.stopPropagation(); navigateTo(sub)"
            >
              {{ sub.name }}
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </button>
          </div>
        </div>

      </div>
    </div>

    <!-- Skeleton -->
    <ng-template #skelTpl>
      <div class="cat-grid">
        <div *ngFor="let i of [1,2,3,4,5,6,7,8]" class="cat-card cat-card--skeleton"></div>
      </div>
    </ng-template>

  </div>
</section>

<style>
/* ================================================================
   CATEGORY GRID — M3allem design tokens
   ================================================================ */
.cat-section {
  padding: var(--space-20) 0 var(--space-24);
  background: var(--color-primary-50);
}

/* ── Header ── */
.cat-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: var(--space-10);
  direction: rtl;
  flex-wrap: wrap;
  gap: var(--space-4);
}
.cat-header__left { display: flex; flex-direction: column; gap: var(--space-3); }

.cat-tag {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  color: var(--color-accent-dark);
  font-size: var(--text-xs);
  font-weight: var(--font-extrabold);
  letter-spacing: var(--tracking-widest);
  text-transform: uppercase;
  font-family: var(--font-arabic);
}

.cat-title {
  font-size: clamp(var(--text-2xl), 3vw, var(--text-4xl));
  font-weight: var(--font-extrabold);
  color: var(--text-primary);
  font-family: var(--font-arabic);
  line-height: var(--leading-tight);
  direction: rtl;
}
.cat-title__accent { color: var(--color-primary); }

/* CTA split button */
.cat-cta {
  display: inline-flex;
  align-items: center;
  gap: var(--space-3);

  height: var(--btn-height-lg);
  padding: 0 var(--space-8);

  border-radius: var(--radius-sm);

  background: var(--color-accent);
  color: var(--color-primary-900);

  border: 2px solid var(--color-accent);

  font-size: var(--text-base);
  font-weight: var(--font-bold);
  font-family: var(--font-arabic);

  text-decoration: none;
  cursor: pointer;

  transition: var(--transition-all);
  white-space: nowrap;
}

.cat-cta:hover {
  background: var(--color-accent-dark);
  border-color: var(--color-accent-dark);

  transform: translateY(-2px);

  box-shadow: 0 8px 24px rgba(255,180,0,0.35);
}

.cat-cta__arrow {
  display: flex;
  align-items: center;
  justify-content: center;

  transition: transform var(--transition-base);
}

.cat-cta:hover .cat-cta__arrow {
  transform: translateX(4px);
}
/* ── Grid ── */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--space-4);
  direction: rtl;
}

/* ── Card ── */
.cat-card {
  position: relative;
  background: var(--bg-surface);
  border: var(--border-width) solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: var(--space-5) var(--space-5) var(--space-4);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
  text-decoration: none;
  transition: var(--transition-all);
  animation: catReveal 0.5s ease both;
  overflow: hidden;
}
@keyframes catReveal {
  from { opacity: 0; transform: translateY(var(--space-5)); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Top accent line — hidden by default */
.cat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--color-accent);
  transform: scaleX(0);
  transform-origin: right;
  transition: transform var(--transition-base);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}

.cat-card:hover,
.cat-card--active {
  border-color: var(--color-primary-muted);
  box-shadow: var(--shadow-hover);
  transform: translateY(-4px);
}
.cat-card:hover::before,
.cat-card--active::before { transform: scaleX(1); }

.cat-card--active {
  border-color: var(--color-primary-100);
  background: var(--color-primary-subtle);
}

/* Icon */
.cat-card__icon {
  width: 60px;
  height: 60px;
  border-radius: var(--radius-md);
  background: var(--color-primary-subtle);
  border: var(--border-width) solid var(--color-primary-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--color-primary);
  transition: var(--transition-all);
  flex-shrink: 0;
}
.cat-card:hover .cat-card__icon,
.cat-card--active .cat-card__icon {
  background: var(--color-accent);
  border-color: var(--color-accent);
  color: var(--color-primary-900);
  transform: scale(1.06) rotate(-4deg);
  box-shadow: var(--shadow-md);
}

/* Body */
.cat-card__body { display: flex; flex-direction: column; gap: var(--space-1); flex: 1; }
.cat-card__name {
  font-size: var(--text-base);
  font-weight: var(--font-bold);
  color: var(--text-primary);
  font-family: var(--font-arabic);
  line-height: var(--leading-snug);
  transition: color var(--transition-base);
}
.cat-card:hover .cat-card__name,
.cat-card--active .cat-card__name { color: var(--color-primary); }

.cat-card__count {
  font-size: var(--text-xs);
  color: var(--text-secondary);
  font-family: var(--font-arabic);
}

/* Arrow */
.cat-card__arrow {
  align-self: flex-end;
  width: 28px; height: 28px;
  border-radius: var(--radius-full);
  background: var(--color-neutral-100);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  transition: var(--transition-all);
  flex-shrink: 0;
}
.cat-card:hover .cat-card__arrow,
.cat-card--active .cat-card__arrow {
  background: var(--color-primary);
  color: var(--text-inverse);
  transform: translateX(-3px);
}

/* ── Flyout (subcategories) ── */
.cat-card__flyout {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--color-primary-900);
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  animation: flyoutIn 0.28s cubic-bezier(0.4, 0, 0.2, 1) both;
  z-index: var(--z-raised);
  box-shadow: var(--shadow-xl);
  overflow: hidden;
}
@keyframes flyoutIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.cat-card__flyout-inner {
  padding: var(--space-3);
  display: flex;
  flex-direction: column;
  gap: 2px;
  max-height: 220px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--color-primary-600) transparent;
}

/* Sub item */
.cat-sub {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.75);
  font-size: var(--text-sm);
  font-weight: var(--font-medium);
  font-family: var(--font-arabic);
  cursor: pointer;
  text-align: right;
  direction: rtl;
  transition: var(--transition-all);
  width: 100%;
}
.cat-sub:hover {
  background: rgba(255, 180, 0, 0.12);
  color: var(--color-accent);
  padding-right: var(--space-4);
}

/* ── Skeleton ── */
.cat-card--skeleton {
  pointer-events: none;
  min-height: 140px;
  background: linear-gradient(90deg,
    var(--color-neutral-100) 25%,
    var(--color-neutral-200) 50%,
    var(--color-neutral-100) 75%
  );
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border: none;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── Responsive ── */
@media (max-width: 1100px) {
  .cat-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 768px) {
  .cat-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 480px) {
  .cat-grid { grid-template-columns: repeat(2, 1fr); gap: var(--space-3); }
  .cat-card { padding: var(--space-4); }
  .cat-header { flex-direction: column; align-items: flex-start; }
}
</style>
