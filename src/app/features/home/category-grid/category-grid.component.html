<section class="cat-section">
  <div class="container">

    <!-- Header -->
    <div class="cat-header">
      <div class="cat-header__left">
        <div class="cat-eyebrow">
          <span class="cat-eyebrow__dot"></span>
          <span>تصفح التخصصات</span>
          <span class="cat-eyebrow__dot"></span>
        </div>
        <h2 class="cat-title">
          اختار <span class="cat-title__highlight">الخدمة</span> اللي تحتاجها
        </h2>
      </div>
     <a routerLink="/workers" class="cat-cta">
  كل الخدمات

  <svg
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    width="16"
    height="16"
  >
    <path d="M5 12h14M12 5l7 7-7 7"/>
  </svg>
</a>
    </div>

    <!-- Bento Grid -->
    <div
      class="cat-bento"
      *ngIf="categories.length; else skelTpl"
      appClickOutside
      (clickOutside)="activeCategory = null"
    >
      <div
        *ngFor="let cat of categories; let i = index"
        class="cat-card"
        [class.cat-card--active]="activeCategory?.id === cat.id"
        [attr.data-size]="getCardSize(i)"
        [style.--i]="i"
        (click)="setActive(cat)"
      >
        <!-- Background image -->
        <div class="cat-card__media" [style.background-image]="'url(' + getCategoryImage(cat.icon) + ')'" ></div>

        <!-- Dark gradient overlay -->
        <div class="cat-card__overlay"></div>

        <!-- Content -->
        <div class="cat-card__body">
          <div class="cat-card__meta">
            <span class="cat-card__index">{{ formatIndex(i) }}</span>
            <span class="cat-card__count" *ngIf="cat.subcategories?.length">
              {{ cat.subcategories.length }} تخصص
            </span>
          </div>

          <div class="cat-card__footer">
            <div class="cat-card__icon-wrap">
              <ng-container [ngSwitch]="cat.icon">
                <svg *ngSwitchCase="'plumbing'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                  <path d="M3 3h5v5H3zM3 8h2v5H3zM5 13h5"/><path d="M10 10h3a3 3 0 0 1 0 6h-3"/>
                  <path d="M16.5 5.5L18 4a2 2 0 0 1 2.83 2.83L19.5 8.5l-3-3z"/><path d="M16.5 8.5l-2 2"/>
                </svg>
                <svg *ngSwitchCase="'electrical'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                  <circle cx="12" cy="12" r="9"/><path d="M12 7l-4 5h4l-1 5 5-7h-4l1-3z"/>
                </svg>
                <svg *ngSwitchCase="'carpentry'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                  <path d="M2 6h13v5H2z"/><path d="M15 8h4l3 3v4h-7V8z"/>
                  <path d="M5 11v6M9 11v6M2 17h13"/><path d="M18 11v6"/>
                </svg>
                <svg *ngSwitchCase="'painting'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                  <rect x="2" y="2" width="15" height="6" rx="2"/><path d="M17 4h1.5a2 2 0 0 1 0 4H17"/>
                  <path d="M9 8v4h2v4a2 2 0 0 1-4 0v-4h2V8"/><path d="M4 18h6"/>
                </svg>
                <svg *ngSwitchCase="'ac'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                  <rect x="2" y="3" width="20" height="8" rx="2"/><path d="M6 11v4M12 11v6M18 11v4"/>
                  <path d="M4 15l2-2 2 2M10 14l2 3 2-3M16 15l2-2 2 2"/><path d="M4 20h5M15 20h5"/>
                </svg>
                <svg *ngSwitchCase="'cleaning'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                  <path d="M9 2h6l1 5H8L9 2z"/><path d="M8 7h8v9a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2V7z"/>
                  <path d="M14 10h3l1 2h-4"/>
                  <circle cx="19" cy="5" r="1"/><circle cx="21" cy="8" r="1"/><circle cx="20" cy="11" r="1"/>
                </svg>
                <svg *ngSwitchCase="'moving'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                  <rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 5v5h-7V8z"/>
                  <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
                </svg>
                <svg *ngSwitchCase="'tiling'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                  <rect x="2" y="2" width="9" height="9" rx="1"/><rect x="13" y="2" width="9" height="9" rx="1"/>
                  <rect x="2" y="13" width="9" height="9" rx="1"/><rect x="13" y="13" width="9" height="9" rx="1"/>
                </svg>
                <svg *ngSwitchDefault viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                  <circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/>
                </svg>
              </ng-container>
            </div>

            <div class="cat-card__text">
              <h3 class="cat-card__name">{{ cat.name }}</h3>
            </div>

            <div class="cat-card__arrow">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </div>
          </div>
        </div>

        <!-- Subcategories flyout -->
        <div class="cat-flyout" *ngIf="cat.subcategories?.length && activeCategory?.id === cat.id" (click)="$event.stopPropagation()">
          <div class="cat-flyout__head">
            <span class="cat-flyout__title">{{ cat.name }}</span>
            <button class="cat-flyout__close" (click)="activeCategory = null">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
          </div>
          <div class="cat-flyout__list">
            <button
              *ngFor="let sub of cat.subcategories"
              class="cat-flyout__item"
              (click)="navigateTo(sub)"
            >
              <span class="cat-flyout__dot"></span>
              {{ sub.name }}
              <svg class="cat-flyout__arr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="10" height="10">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </button>
          </div>
        </div>

      </div>
    </div>

    <!-- Skeleton -->
    <ng-template #skelTpl>
      <div class="cat-bento">
        <div *ngFor="let i of [1,2,3,4,5,6,7,8]" class="cat-card cat-card--skeleton" [attr.data-size]="getCardSize(i - 1)"></div>
      </div>
    </ng-template>

  </div>
</section>

<style>
/* ================================================================
   CATEGORY GRID — M3allem · Bento Layout v3
   ================================================================ */

.cat-section {
  padding: var(--space-20) 0 var(--space-24);
  background: var(--color-primary-50);
}

/* ── Header ── */
.cat-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: var(--space-10);
  direction: rtl;
  flex-wrap: wrap;
  gap: var(--space-4);
}
.cat-header__left { display: flex; flex-direction: column; gap: var(--space-3); }

.cat-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--text-xs);
  font-weight: var(--font-extrabold);
  color: var(--color-accent-dark);
  letter-spacing: var(--tracking-widest);
  text-transform: uppercase;
  font-family: var(--font-arabic);
}
.cat-eyebrow__dot {
  width: 5px; height: 5px;
  border-radius: var(--radius-full);
  background: var(--color-accent);
  display: inline-block;
}

.cat-title {
  font-size: clamp(var(--text-2xl), 3vw, var(--text-4xl));
  font-weight: var(--font-extrabold);
  color: var(--text-primary);
  font-family: var(--font-arabic);
  line-height: var(--leading-tight);
  direction: rtl;
}
.cat-title__highlight {
  color: var(--color-primary);
  text-decoration-color: var(--color-accent);
  text-decoration-thickness: 3px;
  text-underline-offset: 5px;
}

.cat-cta {
  display: inline-flex;
  align-items: center;
  gap: var(--space-3);

  height: var(--btn-height-lg);
  padding: 0 var(--space-8);

  border-radius: var(--radius-sm);

  font-size: var(--text-base);
  font-weight: var(--font-bold);
  font-family: var(--font-arabic);

  cursor: pointer;
  text-decoration: none;
  white-space: nowrap;

  background: var(--color-accent);
  color: var(--color-primary-900);
  border: 2px solid var(--color-accent);

  transition: var(--transition-all);
}

.cat-cta:hover {
  background: var(--color-accent-dark);
  border-color: var(--color-accent-dark);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(255,180,0,0.35);
}

/* ================================================================
   BENTO GRID
   ================================================================ */
.cat-bento {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  grid-auto-rows: 130px;
  gap: var(--space-3);
  direction: rtl;
}

/*
  Layout pattern (12-col):
  Card 0: big featured   → col 1-5,  rows 1-3  (wide tall)
  Card 1: tall right     → col 6-8,  rows 1-3  (narrow tall)
  Card 2: small          → col 9-12, rows 1-2
  Card 3: small          → col 9-12, rows 3
  Card 4: wide short     → col 1-6,  row 4
  Card 5: small          → col 7-9,  row 4
  Card 6: medium         → col 10-12,row 4
  Card 7: wide short     → col 1-12, rows 5    (full width short)
*/
.cat-card:nth-child(1) { grid-column: 1 / 6;  grid-row: 1 / 4; }
.cat-card:nth-child(2) { grid-column: 6 / 9;  grid-row: 1 / 4; }
.cat-card:nth-child(3) { grid-column: 9 / 13; grid-row: 1 / 3; }
.cat-card:nth-child(4) { grid-column: 9 / 13; grid-row: 3 / 4; }
.cat-card:nth-child(5) { grid-column: 1 / 6;  grid-row: 4 / 5; }
.cat-card:nth-child(6) { grid-column: 6 / 9;  grid-row: 4 / 5; }
.cat-card:nth-child(7) { grid-column: 9 / 11; grid-row: 4 / 5; }
.cat-card:nth-child(8) { grid-column: 11 / 13;grid-row: 4 / 5; }

/* Extra cards fallback */
.cat-card:nth-child(n+9) { grid-column: span 3; }

/* ── Card base ── */
.cat-card {
  position: relative;
  border-radius: var(--radius-xl);
  overflow: hidden;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition:
    transform 0.32s cubic-bezier(0.34, 1.3, 0.64, 1),
    box-shadow 0.28s ease,
    border-color 0.2s ease;
  animation: bentoPop 0.55s ease both;
  animation-delay: calc(var(--i, 0) * 65ms);
}
@keyframes bentoPop {
  from { opacity: 0; transform: scale(0.94) translateY(16px); }
  to   { opacity: 1; transform: scale(1)    translateY(0); }
}

.cat-card:hover {
  transform: scale(1.025) translateY(-4px);
  box-shadow: 0 20px 50px rgba(27, 43, 110, 0.28);
  border-color: var(--color-accent);
  z-index: 2;
}
.cat-card--active {
  border-color: var(--color-accent);
  box-shadow: 0 16px 40px rgba(27, 43, 110, 0.22);
  z-index: 2;
}

/* ── Media (background image) ── */
.cat-card__media {
  position: absolute;
  inset: 0;
  background-color: var(--color-primary-900);
  background-size: cover;
  background-position: center;
  transition: transform 0.65s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              filter 0.4s ease;
  filter: saturate(0.85) brightness(0.95);
}
.cat-card:hover .cat-card__media {
  transform: scale(1.07);
  filter: saturate(1.05) brightness(1);
}

/* Placeholder when no image */
.cat-card__media-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  background: repeating-linear-gradient(
    -45deg,
    var(--color-primary-900) 0px,
    var(--color-primary-900) 10px,
    var(--color-primary-800) 10px,
    var(--color-primary-800) 20px
  );
}
.placeholder-icon {
  width: 52px; height: 52px;
  border-radius: var(--radius-md);
  background: rgba(255,255,255,0.06);
  border: 1.5px dashed rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.3);
}
.cat-card__media-placeholder span {
  font-size: var(--text-xs);
  color: rgba(255,255,255,0.25);
  font-family: var(--font-arabic);
  font-weight: var(--font-medium);
}

/* ── Overlay ── */
.cat-card__overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to top, rgba(9,14,39,0.95) 0%, rgba(9,14,39,0.4) 50%, rgba(9,14,39,0.1) 100%);
  transition: background 0.3s ease;
}
.cat-card:hover .cat-card__overlay {
  background:
    linear-gradient(to top, rgba(9,14,39,0.98) 0%, rgba(9,14,39,0.5) 55%, rgba(9,14,39,0.15) 100%);
}

/* Gold shimmer line on top edge */
.cat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 8%; right: 8%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--color-accent), transparent);
  opacity: 0;
  transform: scaleX(0.4);
  transition: opacity 0.3s ease, transform 0.35s ease;
  z-index: 4;
  border-radius: var(--radius-full);
}
.cat-card:hover::before,
.cat-card--active::before { opacity: 1; transform: scaleX(1); }

/* ── Card body ── */
.cat-card__body {
  position: absolute;
  inset: 0;
  z-index: 3;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: var(--space-4);
  direction: rtl;
}

/* Top meta row */
.cat-card__meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.cat-card__index {
  font-size: 10px;
  font-weight: var(--font-extrabold);
  color: rgba(255,255,255,0.25);
  font-family: var(--font-sans);
  letter-spacing: var(--tracking-wider);
  transition: color var(--transition-base);
}
.cat-card:hover .cat-card__index { color: rgba(255,255,255,0.5); }

.cat-card__count {
  font-size: 10px;
  font-weight: var(--font-extrabold);
  font-family: var(--font-arabic);
  padding: 3px 9px;
  border-radius: var(--radius-full);
  background: rgba(255,180,0,0.12);
  border: 1px solid rgba(255,180,0,0.35);
  color: var(--color-accent);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  transition: var(--transition-all);
}
.cat-card:hover .cat-card__count,
.cat-card--active .cat-card__count {
  background: var(--color-accent);
  color: var(--color-primary-900);
  border-color: var(--color-accent);
}

/* Bottom footer row */
.cat-card__footer {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.cat-card__icon-wrap {
  flex-shrink: 0;
  width: 40px; height: 40px;
  border-radius: var(--radius-md);
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.18);
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: var(--transition-all);
}
.cat-card:hover .cat-card__icon-wrap,
.cat-card--active .cat-card__icon-wrap {
  background: var(--color-accent);
  border-color: var(--color-accent);
  color: var(--color-primary-900);
  transform: rotate(-10deg) scale(1.1);
  box-shadow: 0 4px 16px rgba(255,180,0,0.45);
}

.cat-card__text { flex: 1; min-width: 0; }
.cat-card__name {
  font-size: var(--text-base);
  font-weight: var(--font-extrabold);
  color: #fff;
  font-family: var(--font-arabic);
  line-height: var(--leading-snug);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* First card — bigger name */
.cat-card:nth-child(1) .cat-card__name { font-size: var(--text-xl); }
.cat-card:nth-child(2) .cat-card__name { font-size: var(--text-lg); }

.cat-card__arrow {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border-radius: var(--radius-full);
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.14);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.45);
  transition: var(--transition-all);
}
.cat-card:hover .cat-card__arrow,
.cat-card--active .cat-card__arrow {
  background: var(--color-primary);
  border-color: var(--color-primary);
  color: #fff;
  transform: translateX(-3px);
}

/* ── Flyout ── */
.cat-flyout {
  position: absolute;
  inset: 0;
  z-index: 10;
  background: rgba(9, 14, 39, 0.97);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-radius: var(--radius-xl);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: flyPop 0.2s cubic-bezier(0.34, 1.4, 0.64, 1) both;
}
@keyframes flyPop {
  from { opacity: 0; transform: scale(0.92); }
  to   { opacity: 1; transform: scale(1); }
}

.cat-flyout__head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-4) var(--space-3);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  direction: rtl;
}
.cat-flyout__title {
  font-size: var(--text-sm);
  font-weight: var(--font-extrabold);
  color: var(--color-accent);
  font-family: var(--font-arabic);
}
.cat-flyout__close {
  width: 24px; height: 24px;
  border-radius: var(--radius-full);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  transition: var(--transition-all);
}
.cat-flyout__close:hover { background: rgba(239,68,68,0.15); color: #f87171; }

.cat-flyout__list {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-2) var(--space-3);
  display: flex;
  flex-direction: column;
  gap: 1px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,180,0,0.25) transparent;
}

.cat-flyout__item {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.6);
  font-size: var(--text-sm);
  font-weight: var(--font-medium);
  font-family: var(--font-arabic);
  cursor: pointer;
  text-align: right;
  direction: rtl;
  width: 100%;
  transition: var(--transition-all);
}
.cat-flyout__dot {
  width: 4px; height: 4px;
  border-radius: var(--radius-full);
  background: rgba(255,180,0,0.4);
  flex-shrink: 0;
  transition: background var(--transition-base);
}
.cat-flyout__arr {
  margin-right: auto;
  color: var(--color-accent);
  opacity: 0;
  transition: var(--transition-all);
}
.cat-flyout__item:hover {
  background: rgba(255,180,0,0.08);
  color: #fff;
  padding-right: calc(var(--space-3) + 4px);
}
.cat-flyout__item:hover .cat-flyout__dot { background: var(--color-accent); }
.cat-flyout__item:hover .cat-flyout__arr { opacity: 1; transform: translateX(-2px); }

/* ── Skeleton ── */
.cat-card--skeleton {
  pointer-events: none;
  background: linear-gradient(
    90deg,
    var(--color-neutral-100) 25%,
    var(--color-neutral-200) 50%,
    var(--color-neutral-100) 75%
  );
  background-size: 200% 100%;
  animation: shimmer 1.6s infinite;
  border: none !important;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── Responsive ── */
@media (max-width: 1100px) {
  .cat-bento { grid-template-columns: repeat(6, 1fr); grid-auto-rows: 140px; }
  .cat-card:nth-child(1) { grid-column: 1 / 4; grid-row: 1 / 3; }
  .cat-card:nth-child(2) { grid-column: 4 / 7; grid-row: 1 / 3; }
  .cat-card:nth-child(3) { grid-column: 1 / 3; grid-row: 3; }
  .cat-card:nth-child(4) { grid-column: 3 / 5; grid-row: 3; }
  .cat-card:nth-child(5) { grid-column: 5 / 7; grid-row: 3; }
  .cat-card:nth-child(6) { grid-column: 1 / 3; grid-row: 4; }
  .cat-card:nth-child(7) { grid-column: 3 / 5; grid-row: 4; }
  .cat-card:nth-child(8) { grid-column: 5 / 7; grid-row: 4; }
