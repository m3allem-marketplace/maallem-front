<section class="hero-section">

  <!-- Slideshow backgrounds -->
  <div class="hero-slides">
    <div
      *ngFor="let slide of slides; let i = index"
      class="hero-slide"
      [class.hero-slide--active]="i === activeSlide"
      [class.hero-slide--prev]="i === prevSlide"
      [style.backgroundImage]="'url(' + slide.image + ')'"
    ></div>
  </div>

  <!-- Dark overlay -->
  <div class="hero-overlay" aria-hidden="true"></div>

  <!-- Slide indicators -->
  <div class="hero-dots">
    <button
      *ngFor="let slide of slides; let i = index"
      class="hero-dot"
      [class.hero-dot--active]="i === activeSlide"
      (click)="goToSlide(i)"
      [attr.aria-label]="'Slide ' + (i + 1)"
    ></button>
  </div>

  <!-- Main content -->
  <div class="hero-container">
  <div class="hero-copy" [class.hero-copy--animating]="isAnimating && animationsEnabled">

      <span class="hero-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
          <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
        {{ slides[activeSlide].badge }}
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
          <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
      </span>

      <h1 class="hero-headline">{{ slides[activeSlide].headline }}</h1>

      <p class="hero-sub">{{ slides[activeSlide].sub }}</p>

      <!-- Search bar -->
      <div class="hero-search">
        <app-search-bar
          placeholder="ابحث عن... سباك، كهربائي، نجار"
          (searchChange)="onSearchChange($event)"
        ></app-search-bar>
      </div>

      <!-- CTAs -->
      <div class="hero-ctas">
        <ng-container *ngIf="!isLoggedIn; else loggedInCtas">
          <a routerLink="/workers" class="hero-btn hero-btn--primary">
            اكتشف أكتر
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </a>
          <a routerLink="/auth/register" class="hero-btn hero-btn--outline">
            انضم كصنايعي
          </a>
        </ng-container>
        <ng-template #loggedInCtas>
          <a routerLink="/customer/bid-requests" class="hero-btn hero-btn--primary">
           أضف خدمة جديدة     
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </a>
        </ng-template>
      </div>

      <!-- Social proof -->
      <div class="hero-trust">
        <div class="hero-avatars">
          <img src="https://i.pravatar.cc/40?img=11" alt="" />
          <img src="https://i.pravatar.cc/40?img=32" alt="" />
          <img src="https://i.pravatar.cc/40?img=44" alt="" />
          <span class="hero-avatars__plus">+</span>
        </div>
        <div class="hero-trust__text">
          <strong>10k+</strong>
          <span>عميل راضي</span>
        </div>
      </div>

    </div>
  </div>

  <!-- Slide arrows -->
  <button class="hero-arrow hero-arrow--prev" (click)="prevSlideClick()" aria-label="Previous">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  </button>
  <button class="hero-arrow hero-arrow--next" (click)="nextSlideClick()" aria-label="Next">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20">
      <path d="M9 18l6-6-6-6"/>
    </svg>
  </button>

</section>

<style>

.hero-section {
  position: relative;
  min-height: 85vh;

  width: 100%;

  margin: 0;

  border-radius: 0;

  overflow: hidden;

  z-index: 1;
}
/* ---- Slides ---- */
.hero-slides {
  position: absolute;
  inset: 0;
  z-index: 0;
}

.hero-slide {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0;
  /* smoother fade + subtle scale transition */
  transition: opacity 600ms cubic-bezier(0.22, 1, 0.36, 1), transform 900ms cubic-bezier(0.22, 1, 0.36, 1);
  will-change: opacity, transform;
}

.hero-slide--active {
  opacity: 1;
  z-index: 2;
  /* subtle, non-jumpy zoom for active slide */
  transform: scale(1.03);
}

.hero-slide--prev {
  opacity: 0;
  z-index: 1;
}

@keyframes kenBurns {
  0%   { transform: scale(1)    translateX(0)    translateY(0); }
  100% { transform: scale(1.08) translateX(-1%)  translateY(-1%); }
}

/* alternate directions via nth-child */
.hero-slide:nth-child(2).hero-slide--active,
.hero-slide:nth-child(3).hero-slide--active {
  /* use the same smooth transform transition as other slides */
  transform: scale(1.03);
}

@keyframes kenBurns2 {
  0%   { transform: scale(1.06) translateX(1%)   translateY(0); }
  100% { transform: scale(1)    translateX(0)    translateY(-1%); }
}
@keyframes kenBurns3 {
  0%   { transform: scale(1)    translateX(0)    translateY(1%); }
  100% { transform: scale(1.07) translateX(-1%)  translateY(0); }
}

/* ---- Overlay gradient — navy dark like M3allem ---- */
.hero-overlay {
  position: absolute;
  inset: 0;
  z-index: 3;
  background: linear-gradient(
    105deg,
    rgba(13, 21, 58, 0.88) 0%,
    rgba(27, 43, 110, 0.70) 45%,
    rgba(13, 21, 58, 0.25) 100%
  );
}

/* ---- Container ---- */
.hero-container {
  position: relative;
  z-index: 5;

  width: 100%;
  padding: 80px 60px;
}

.hero-search {
  width: 100%;
  max-width: 640px;
  margin-top: var(--space-6);
}
.hero-search app-search-bar {
  width: 100%;
}

/* ---- Copy ---- */
.hero-copy {
  max-width: 580px;
  margin: 0 50px 0 auto;
  display: flex;
  flex-direction: column;
  gap: var(--space-6);
  direction: rtl;
  align-items: flex-start;
  text-align: right;
  overflow: hidden;
  font-family: 'Cairo', var(--font-arabic);
}

.hero-copy, .hero-copy * {
  font-family: 'Cairo', var(--font-arabic) !important;
}

.hero-copy--animating {
  animation: heroCopyReveal 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
  transform-style: preserve-3d;
}

.hero-copy--animating .hero-badge,
.hero-copy--animating .hero-headline,
.hero-copy--animating .hero-sub,
.hero-copy--animating .hero-ctas,
.hero-copy--animating .hero-trust {
  animation: heroTextFlip 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
  transform-origin: center center;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  /* prevent font rendering from switching to italic/light during transforms */
  font-style: normal;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  will-change: transform, opacity;
}

.hero-copy--animating .hero-badge {
  animation-delay: 0.08s;
}
.hero-copy--animating .hero-headline {
  animation-delay: 0.16s;
}
.hero-copy--animating .hero-sub {
  animation-delay: 0.24s;
}
.hero-copy--animating .hero-ctas {
  animation-delay: 0.32s;
}
.hero-copy--animating .hero-trust {
  animation-delay: 0.40s;
}

@keyframes heroCopyReveal {
  from {
    opacity: 0;
    transform: none;
  }
  to {
    opacity: 1;
    transform: none;
  }
}

@keyframes heroTextFlip {
  from {
    opacity: 0;
    transform: none;
  }
  60% {
    opacity: 1;
    transform: none;
  }
  to {
    opacity: 1;
    transform: none;
  }
}

@keyframes textFadeUp {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Badge */
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  color: var(--color-accent);
  font-size: var(--text-xs);
  font-weight: var(--font-extrabold);
  letter-spacing: var(--tracking-widest);
  text-transform: uppercase;
}

/* Headline */
.hero-headline {
  font-size: clamp(2.2rem, 4.5vw, 3.75rem);
  font-weight: var(--font-extrabold);
  color: var(--color-neutral-0);
  line-height: var(--leading-tight);
  letter-spacing: var(--tracking-tight);
  font-family: var(--font-arabic);
}

/* Sub */
.hero-sub {
  font-size: var(--text-lg);
  color: rgba(255,255,255,0.72);
  line-height: var(--leading-relaxed);
  max-width: 460px;
}


/* ---- CTA Buttons ---- */
.hero-ctas {
  display: flex;
  gap: var(--space-4);
  flex-wrap: wrap;
  justify-content: flex-end;
  direction: rtl;
}

.hero-btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-3);
  height: var(--btn-height-lg);
  padding: 0 var(--space-8);
  border-radius: var(--radius-sm);
  font-size: var(--text-base);
  font-weight: var(--font-bold);
  font-family: var(--font-arabic);
  cursor: pointer;
  text-decoration: none;
  transition: var(--transition-all);
  white-space: nowrap;
  border: 2px solid transparent;
}
.hero-btn--primary {
  background: var(--color-accent);
  color: var(--color-primary-900);
  border-color: var(--color-accent);
}
.hero-btn--primary:hover {
  background: var(--color-accent-dark);
  border-color: var(--color-accent-dark);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(255,180,0,0.35);
}
.hero-btn--outline {
  background: transparent;
  color: var(--color-neutral-0);
  border-color: rgba(255,255,255,0.45);
}
.hero-btn--outline:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.8);
  transform: translateY(-2px);
}

/* ---- Social Proof ---- */
.hero-trust {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  direction: rtl;
}
.hero-avatars {
  display: flex;
  align-items: center;
}
.hero-avatars img {
  width: 36px; height: 36px;
  border-radius: var(--radius-full);
  border: 2px solid var(--color-neutral-0);
  object-fit: cover;
  margin-left: -10px;
}
.hero-avatars img:first-child { margin-left: 0; }
.hero-avatars__plus {
  width: 36px; height: 36px;
  border-radius: var(--radius-full);
  background: var(--color-accent);
  color: var(--color-primary-900);
  font-size: var(--text-sm);
  font-weight: var(--font-extrabold);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-left: -10px;
  border: 2px solid var(--color-neutral-0);
}
.hero-trust__text {
  display: flex;
  flex-direction: column;
}
.hero-trust__text strong {
  font-size: var(--text-lg);
  font-weight: var(--font-extrabold);
  color: var(--color-neutral-0);
}
.hero-trust__text span {
  font-size: var(--text-xs);
  color: rgba(255,255,255,0.55);
}

/* ---- Arrows ---- */
.hero-arrow {
  position: absolute;
  top: 50%;
  z-index: 6;
  width: 48px; height: 48px;
  border-radius: var(--radius-full);
  background: rgba(255,255,255,0.12);
  border: 1.5px solid rgba(255,255,255,0.30);
  color: var(--color-neutral-0);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: var(--transition-all);
  backdrop-filter: blur(4px);
  transform: translateY(-50%);
}
.hero-arrow:hover {
  background: var(--color-accent);
  border-color: var(--color-accent);
  color: var(--color-primary-900);
  transform: translateY(-50%) scale(1.08);
}
.hero-arrow--prev { left: var(--space-6); }
.hero-arrow--next { right: var(--space-6); left: auto; }

/* ---- Dots ---- */
.hero-dots {
  position: absolute;
  bottom: calc(var(--space-12) + 14px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 6;
  display: flex;
  gap: var(--space-2);
}
.hero-dot {
  width: 8px; height: 8px;
  border-radius: var(--radius-full);
  background: rgba(255,255,255,0.35);
  border: none;
  cursor: pointer;
  transition: var(--transition-all);
  padding: 0;
}
.hero-dot--active {
  background: var(--color-accent);
  width: 28px;
}

/* ---- Responsive ---- */
@media (max-width: 768px) {
  .hero-section {
    min-height: auto;
    padding-bottom: 40px;
  }
  .hero-container {
    padding: 56px 24px 32px;
  }
  .hero-copy {
    margin: 0;
    width: 100%;
    max-width: 100%;
    padding: 0;
    text-align: right;
    align-items: flex-start;
  }
  .hero-headline {
    font-size: clamp(2rem, 6vw, 3rem);
  }
  .hero-sub {
    max-width: 100%;
  }
  .hero-search {
    width: 100%;
    max-width: 100%;
  }
  .hero-ctas {
    flex-direction: column;
    gap: var(--space-3);
    justify-content: center;
    align-items: stretch;
  }
  .hero-btn {
    width: 100%;
    justify-content: center;
    padding: 0.95rem 1rem;
  }
  .hero-trust {
    justify-content: center;
    width: 100%;
  }
  .hero-trust__text {
    align-items: center;
    text-align: center;
    width: 100%;
  }
  .hero-arrow {
    display: none;
  }
  .hero-dots {
    bottom: 18px;
    gap: var(--space-2);
  }
}

@media (max-width: 520px) {
  .hero-container {
    padding: 40px 18px 24px;
  }
  .hero-copy {
    gap: var(--space-5);
  }
  .hero-sub {
    font-size: 0.98rem;
  }
  .hero-avatars img,
  .hero-avatars__plus {
    width: 32px;
    height: 32px;
  }
  .hero-avatars img {
    margin-left: -8px;
  }
}
</style>
