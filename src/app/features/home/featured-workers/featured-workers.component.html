<section class="workers-section">
  <div class="container">

    <div class="workers-header">
      <div class="workers-header__text">
        <div class="section-header__label">
          <span>صنايعية مميزين</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFB300" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user-star" aria-hidden="true">
            <path d="M16.051 12.616a1 1 0 0 1 1.909.024l.737 1.452a1 1 0 0 0 .737.535l1.634.256a1 1 0 0 1 .588 1.806l-1.172 1.168a1 1 0 0 0-.282.866l.259 1.613a1 1 0 0 1-1.541 1.134l-1.465-.75a1 1 0 0 0-.912 0l-1.465.75a1 1 0 0 1-1.539-1.133l.258-1.613a1 1 0 0 0-.282-.866l-1.156-1.153a1 1 0 0 1 .572-1.822l1.633-.256a1 1 0 0 0 .737-.535z"/>
            <path d="M8 15H7a4 4 0 0 0-4 4v2"/>
            <circle cx="10" cy="7" r="4"/>
          </svg>
        </div>
        <h2 class="section-header__title">
          أفضل <span class="section-header__accent">المعلمين</span> عندنا
        </h2>
        <p class="section-header__sub">
          حرفيين Gold-tier — تقييمات عالية وخبرة مثبتة
        </p>
      </div>

      <div class="workers-header__actions">
        <div class="slider-controls" *ngIf="displayWorkers.length > 4">
          <button class="ctrl-btn ctrl-btn--prev" (click)="scrollSlider('right')" aria-label="السابق">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </button>
          <button class="ctrl-btn ctrl-btn--next" (click)="scrollSlider('left')" aria-label="التالي">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
              <path d="M15 19l-7-7 7-7"/>
            </svg>
          </button>
        </div>

        <a routerLink="/workers" class="workers-header__cta">
          <span>عرض الكل</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </a>
      </div>
    </div>

    <div class="workers-scroll-wrapper" #sliderContainerRef>
      <div class="workers-track" *ngIf="displayWorkers.length; else workersEmpty">
        <app-worker-card
          *ngFor="let worker of displayWorkers"
          [worker]="worker">
        </app-worker-card>
      </div>

      <ng-template #workersEmpty>
        <div class="workers-empty-state">
          <p>لا يوجد عمال متاحون حالياً</p>
        </div>
      </ng-template>
    </div>

  </div>
</section>
