<section class="hiw-section">

  <!-- Background decoration -->
  <div class="hiw-bg-pattern" aria-hidden="true"></div>

  <div class="container">

    <!-- Section Header -->
    <div class="hiw-header">
      <div class="section-header__label">
        خطوات بسيطة
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FFB300" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-handshake-icon lucide-handshake" aria-hidden="true" focusable="false">
          <path d="m11 17 2 2a1 1 0 1 0 3-3"/>
          <path d="m14 14 2.5 2.5a1 1 0 1 0 3-3l-3.88-3.88a3 3 0 0 0-4.24 0l-.88.88a1 1 0 1 1-3-3l2.81-2.81a5.79 5.79 0 0 1 7.06-.87l.47.28a2 2 0 0 0 1.42.25L21 4"/>
          <path d="m21 3 1 11h-2"/>
          <path d="M3 3 2 14l6.5 6.5a1 1 0 1 0 3-3"/>
          <path d="M3 4h8"/>
        </svg>
      </div>
      <h2 class="section-header__title">
        إزاي <span class="section-header__accent">معلّم</span> بيشتغل؟
      </h2>
      <p class="section-header__sub">
        سواء كنت بتدور على صنايعي أو عايز تشتغل — العملية سهلة وسريعة
      </p>

      <!-- Mode Toggle -->
      <div class="hiw-toggle">
        <button
          class="hiw-toggle__btn"
          [class.hiw-toggle__btn--active]="activeMode === 'guest'"
          (click)="setMode('guest')"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          أنا عميل
        </button>
        <button
          class="hiw-toggle__btn"
          [class.hiw-toggle__btn--active]="activeMode === 'worker'"
          (click)="setMode('worker')"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
          </svg>
          أنا صنايعي
        </button>
      </div>
    </div>

    <!-- Steps -->
    <div class="hiw-steps">

      <!-- Connector line (decorative) -->
      <div class="hiw-connector" aria-hidden="true"></div>

      <div
        *ngFor="let step of steps; let i = index"
        class="hiw-step"
        [style.animation-delay]="(i * 120) + 'ms'"
      >
        <!-- Step Number -->
        <div class="hiw-step__number">{{ i + 1 }}</div>

        <!-- Icon Box -->
        <div class="hiw-step__icon-box">
          <span class="hiw-step__icon">{{ step.icon }}</span>
        </div>

        <!-- Content -->
        <div class="hiw-step__content">
          <h3 class="hiw-step__title">{{ step.title }}</h3>
          <p class="hiw-step__desc">{{ step.description }}</p>
        </div>
      </div>

    </div>

    <!-- Bottom CTA -->
    <div class="hiw-cta">
      <ng-container *ngIf="activeMode === 'guest'; else workerCta">
        <a routerLink="/workers" class="hiw-cta__btn hiw-cta__btn--primary">
          ابدأ وابحث عن صنايعي
        </a>
        <a routerLink="/auth/register" class="hiw-cta__btn hiw-cta__btn--outline">
          سجّل مجاناً
        </a>
      </ng-container>
      <ng-template #workerCta>
        <a routerLink="/auth/register" class="hiw-cta__btn hiw-cta__btn--primary">
          سجّل كصنايعي الآن
        </a>
      </ng-template>
    </div>

    <!-- Stats Strip -->
    <div class="hiw-stats">
      <div class="hiw-stat">
        <span class="hiw-stat__num">10K+</span>
        <span class="hiw-stat__label">صنايعي معتمد</span>
      </div>
      <div class="hiw-stat__divider"></div>
      <div class="hiw-stat">
        <span class="hiw-stat__num">50K+</span>
        <span class="hiw-stat__label">حجز مكتمل</span>
      </div>
      <div class="hiw-stat__divider"></div>
      <div class="hiw-stat">
        <span class="hiw-stat__num">4.8⭐</span>
        <span class="hiw-stat__label">متوسط التقييم</span>
      </div>
      <div class="hiw-stat__divider"></div>
      <div class="hiw-stat">
        <span class="hiw-stat__num">98%</span>
        <span class="hiw-stat__label">نسبة الرضا</span>
      </div>
    </div>

  </div>
</section>

<style>
/* ================================================================
   HOW IT WORKS
   ================================================================ */
.hiw-section {
  padding: var(--space-24) 0 var(--space-16);
  background: linear-gradient(180deg, var(--bg-page) 0%, var(--color-primary-50) 100%);
  position: relative;
  overflow: hidden;
}
.hiw-bg-pattern {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 20% 80%, rgba(27,43,110,0.04) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(255,180,0,0.04) 0%, transparent 50%);
  pointer-events: none;
}

/* Re-use header styles */
.section-header__label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: var(--text-sm);
  font-weight: var(--font-semibold);
  color: var(--color-accent);
  letter-spacing: var(--tracking-widest);
  margin-bottom: var(--space-3);
}
.section-header__label svg {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
}
.section-header__title {
  font-size: clamp(1.75rem, 3vw, 2.5rem);
  font-weight: var(--font-extrabold);
  color: var(--text-primary);
  margin-bottom: var(--space-4);
  font-family: var(--font-arabic);
}
.section-header__accent { color: var(--color-primary); }
.section-header__sub {
  font-size: var(--text-lg);
  color: var(--text-secondary);
  max-width: 480px;
  margin: 0 auto var(--space-8);
}

/* Header */
.hiw-header {
  text-align: center;
  margin-bottom: var(--space-16);
  direction: rtl;
}

/* Toggle */
.hiw-toggle {
  display: inline-flex;
  background: var(--bg-surface);
  border-radius: var(--radius-full);
  padding: var(--space-1);
  gap: var(--space-1);
  border: var(--border-width) solid var(--border-color);
  box-shadow: var(--shadow-sm);
}
.hiw-toggle__btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-3) var(--space-6);
  border-radius: var(--radius-full);
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-size: var(--text-sm);
  font-weight: var(--font-semibold);
  font-family: var(--font-arabic);
  cursor: pointer;
  transition: var(--transition-all);
}
.hiw-toggle__btn--active {
  background: var(--color-primary);
  color: var(--text-inverse);
  box-shadow: var(--shadow-md);
}

/* Steps */
.hiw-steps {
  position: relative;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-8);
  direction: rtl;
  margin-bottom: var(--space-16);
}

/* Connector line between steps */
.hiw-connector {
  position: absolute;
  top: 56px;
  right: calc(100% / 6);
  left: calc(100% / 6);
  height: 2px;
  background: linear-gradient(to left,
    var(--color-primary-muted),
    var(--color-accent),
    var(--color-primary-muted)
  );
  z-index: 0;
}
.hiw-connector::before,
.hiw-connector::after {
  content: '';
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--color-accent);
}
.hiw-connector::before { right: 0; }
.hiw-connector::after  { left: 0; }

/* Individual Step */
.hiw-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: var(--space-5);
  position: relative;
  z-index: 1;
  animation: cardReveal 0.5s ease both;
}
@keyframes cardReveal {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.hiw-step__number {
  position: absolute;
  top: -10px;
  right: calc(50% - 12px);
  width: 24px; height: 24px;
  background: var(--color-accent);
  color: var(--color-primary-900);
  border-radius: 50%;
  font-size: var(--text-xs);
  font-weight: var(--font-extrabold);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}

.hiw-step__icon-box {
  width: 80px; height: 80px;
  background: var(--bg-surface);
  border-radius: var(--radius-xl);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  box-shadow: var(--shadow-md);
  border: 2px solid var(--color-primary-muted);
  transition: var(--transition-all);
}
.hiw-step:hover .hiw-step__icon-box {
  transform: scale(1.1) rotate(-5deg);
  border-color: var(--color-accent);
  box-shadow: var(--shadow-hover);
}

.hiw-step__content { display: flex; flex-direction: column; gap: var(--space-2); }
.hiw-step__title {
  font-size: var(--text-xl);
  font-weight: var(--font-bold);
  color: var(--text-primary);
  font-family: var(--font-arabic);
}
.hiw-step__desc {
  font-size: var(--text-base);
  color: var(--text-secondary);
  line-height: var(--leading-relaxed);
  max-width: 240px;
}

/* CTA */
.hiw-cta {
  display: flex;
  justify-content: center;
  gap: var(--space-4);
  margin-bottom: var(--space-16);
  direction: rtl;
  flex-wrap: wrap;
}
.hiw-cta__btn {
  display: inline-flex;
  align-items: center;
  height: var(--btn-height-lg);
  padding: 0 var(--space-10);
  border-radius: var(--btn-radius);
  font-size: var(--text-base);
  font-weight: var(--font-bold);
  font-family: var(--font-arabic);
  text-decoration: none;
  transition: var(--transition-all);
  border: 2px solid transparent;
}
.hiw-cta__btn--primary {
  background: var(--color-primary);
  color: var(--text-inverse);
}
.hiw-cta__btn--primary:hover {
  background: var(--color-primary-light);
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}
.hiw-cta__btn--outline {
  background: transparent;
  border-color: var(--color-primary-muted);
  color: var(--color-primary);
}
.hiw-cta__btn--outline:hover {
  background: var(--color-primary-subtle);
  border-color: var(--color-primary);
}

/* Stats Strip */
.hiw-stats {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-8);
  flex-wrap: wrap;
  background: var(--bg-surface);
  border-radius: var(--radius-2xl);
  padding: var(--space-8) var(--space-12);
  box-shadow: var(--shadow-md);
  border: var(--border-width) solid var(--border-color);
  direction: rtl;
}
.hiw-stat { display: flex; flex-direction: column; align-items: center; gap: var(--space-1); }
.hiw-stat__num {
  font-size: var(--text-2xl);
  font-weight: var(--font-extrabold);
  color: var(--color-primary);
}
.hiw-stat__label {
  font-size: var(--text-sm);
  color: var(--text-secondary);
  white-space: nowrap;
}
.hiw-stat__divider {
  width: 1px; height: 48px;
  background: var(--border-color);
}

/* ---- RESPONSIVE ---- */
@media (max-width: 768px) {
  .hiw-steps { grid-template-columns: 1fr; gap: var(--space-10); }
  .hiw-connector { display: none; }
  .hiw-stats { gap: var(--space-6); padding: var(--space-6); }
  .hiw-stat__divider { display: none; }
}
@media (max-width: 480px) {
  .hiw-cta { flex-direction: column; align-items: center; }
  .hiw-cta__btn { width: 100%; justify-content: center; }
}
</style>
