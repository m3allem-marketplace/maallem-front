<div class="booking-cancel-container max-w-2xl mx-auto my-12 px-4" style="direction: rtl;">
  
  <div class="card p-6 bg-white border border-gray-100 rounded-2xl shadow-sm text-right">
    <div class="flex items-center gap-3 border-b pb-4 mb-6">
      <span class="text-2xl">⚠️</span>
      <div class="flex flex-col">
        <h2 class="text-xl font-extrabold text-gray-900" style="font-family: 'Cairo', var(--font-arabic);">طلب إلغاء الحجز</h2>
        <span class="text-xs text-red-500 font-bold" style="font-family: 'Cairo', var(--font-arabic);">رقم الحجز: {{ bookingId }}</span>
      </div>
    </div>

    <p class="text-sm text-gray-500 mb-6 leading-relaxed" style="font-family: 'Cairo', var(--font-arabic);">
      نحن نأسف لسماع رغبتك في إلغاء الحجز. يرجى اختيار سبب الإلغاء لمساعدتنا في تحسين جودة خدمات المنصة والحرفيين.
    </p>

    <!-- Cancellation Reasons Questionnaire -->
    <div class="flex flex-col gap-3 mb-6">
      <button 
        *ngFor="let reason of reasons" 
        type="button"
        class="reason-btn flex items-center justify-between p-4 rounded-xl border text-right transition-all cursor-pointer bg-white"
        [class.active]="selectedReason === reason"
        (click)="selectReason(reason)"
      >
        <span class="text-sm font-bold" style="font-family: 'Cairo', var(--font-arabic);" [class.text-primary]="selectedReason === reason">{{ reason }}</span>
        <span class="radio-indicator flex items-center justify-center w-5 h-5 rounded-full border-2" [class.active]="selectedReason === reason">
          <span class="inner-dot w-2.5 h-2.5 rounded-full" *ngIf="selectedReason === reason"></span>
        </span>
      </button>
    </div>

    <!-- Additional notes -->
    <div class="mb-6">
      <label class="block text-xs font-bold text-gray-400 mb-2" style="font-family: 'Cairo', var(--font-arabic);">ملاحظات إضافية (اختياري)</label>
      <textarea 
        [value]="additionalNotes"
        (input)="additionalNotes = $any($event.target).value"
        placeholder="يرجى كتابة أي ملاحظات إضافية عن سبب إلغاء الحجز..." 
        rows="4"
        class="w-full p-4 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-red-500 resize-none leading-relaxed"
        style="font-family: 'Cairo', var(--font-arabic);"
      ></textarea>
    </div>

    <!-- Actions -->
    <div class="flex flex-col sm:flex-row gap-3 pt-4 border-t border-gray-50">
      <app-button 
        variant="primary" 
        (click)="openConfirm()" 
        class="w-full sm:w-1/2 font-bold" 
        style="background: var(--color-error); font-family: 'Cairo', var(--font-arabic);"
        [loading]="submitting"
      >
        تأكيد إلغاء الحجز
      </app-button>
      <app-button 
        variant="ghost" 
        (click)="goBack()" 
        class="w-full sm:w-1/2 font-semibold"
        style="font-family: 'Cairo', var(--font-arabic);"
      >
        تراجع والعودة للخلف
      </app-button>
    </div>

  </div>

  <!-- Double Confirm Modal -->
  <app-confirm-modal
    [isOpen]="confirmOpen"
    title="تأكيد إلغاء الحجز نهائياً"
    message="هل أنت متأكد من رغبتك في إلغاء هذا الحجز؟ بمجرد الإلغاء لن تتمكن من التراجع عن هذه العملية وسيتم إشعار الحرفي فوراً."
    confirmText="نعم، تأكيد الإلغاء"
    cancelText="تراجع وإغلاق"
    type="danger"
    (confirm)="executeCancellation()"
    (cancel)="closeConfirm()"
  ></app-confirm-modal>

</div>
