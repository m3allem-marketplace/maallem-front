<div class="auth-wrapper" dir="rtl">
  <div class="auth-card animate-fade-in">

    <div class="logo-container">
      <div class="logo-icon-box">
        <svg width="26" height="26" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" fill="#1B2B6E" stroke="url(#loginLogoGoldGrad)" stroke-width="5" stroke-linejoin="round"/>
          <path d="M30 68V32L50 51L70 32V68" stroke="url(#loginLogoGoldGrad)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="loginLogoGoldGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#DFBA6B" />
              <stop offset="100%" stop-color="#B99343" />
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="logo-text-stack font-arabic">
        <span class="logo-title">مَعْلَم</span>
        <span class="logo-subtitle">منصة الحرفيين</span>
      </div>
    </div>

    <h1 class="auth-title font-arabic">تسجيل الدخول</h1>
    <p class="auth-subtitle font-arabic">الرجاء إدخال البيانات الخاصة بك للوصول إلى حسابك</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">

      <div class="form-group">
        <label class="form-label">البريد الإلكتروني *</label>
        <app-input type="email" formControlName="email" placeholder="username@mail.com" [errorMessage]="getEmailError()">
        </app-input>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label class="form-label">كلمة المرور *</label>
          <button type="button" class="toggle-password-btn" (click)="togglePasswordVisibility()">
            {{ passwordType === 'password' ? 'عرض' : 'إخفاء' }}
          </button>
        </div>
        <app-input [type]="passwordType" formControlName="password" placeholder="••••••••" [errorMessage]="getPasswordError()">
        </app-input>
      </div>

      <div class="actions-row">
        <a routerLink="/auth/forgot-password" class="forgot-link font-arabic">هل نسيت كلمة المرور؟</a>
      </div>

      <div *ngIf="authError$ | async as error" class="store-error-msg font-arabic">
        البريد الإلكتروني أو كلمة المرور غير صحيحة
      </div>

      <div class="submit-wrap">
        <app-button type="submit" [disabled]="loginForm.invalid" [loading]="(authLoading$ | async) ?? false"
          [fullWidth]="true">
          تسجيل الدخول
        </app-button>
      </div>

    </form>

    <div class="register-prompt font-arabic">
      <span>ليس لديك حساب؟</span>
      <a routerLink="/auth/register" class="register-link">سجل الآن</a>
    </div>

  </div>
</div>
