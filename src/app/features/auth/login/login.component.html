<div class="auth-wrapper">
  <div class="auth-card">

    <div class="logo-container">
      <span class="logo-text">
        M<span class="logo-accent">3</span>allem
      </span>

      <div class="logo-icon-box">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
      </div>
    </div>

    <h1 class="auth-title">تسجيل الدخول</h1>
    <p class="auth-subtitle">الرجاء إدخال البيانات الخاصة بك للوصول إلى حسابك</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">

      <div class="form-group">
        <label class="form-label">البريد الإلكتروني *</label>
        <app-input type="email" formControlName="email" placeholder="username@mail.com">
        </app-input>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label class="form-label">كلمة المرور *</label>
          <button type="button" class="toggle-password-btn" (click)="togglePasswordVisibility()">
            {{ passwordType === 'password' ? 'عرض' : 'إخفاء' }}
          </button>
        </div>
        <app-input [type]="passwordType" formControlName="password" placeholder="••••••••">
        </app-input>
      </div>

      <div class="actions-row">
        <a routerLink="/auth/forgot-password" class="forgot-link">هل نسيت كلمة المرور؟</a>
      </div>

      <div *ngIf="authError$ | async as error" class="store-error-msg">
        البريد الإلكتروني أو كلمة المرور غير صحيحة
      </div>

      <div class="submit-wrap">
        <app-button type="submit" [disabled]="loginForm.invalid" [loading]="(authLoading$ | async) ?? false"
          [fullWidth]="true">
          تسجيل الدخول
        </app-button>
      </div>


    </form>

    <div class="register-prompt">
      <span>ليس لديك حساب؟</span>
      <a routerLink="/auth/register" class="register-link">سجل الآن</a>
    </div>

  </div>
</div>
