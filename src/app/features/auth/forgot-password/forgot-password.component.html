<div class="auth-wrapper" dir="rtl">
  <div class="auth-card animate-fade-in">

    <div class="logo-container">
      <div class="logo-icon-box">
        <svg width="26" height="26" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" fill="#1B2B6E" stroke="url(#forgotLogoGoldGrad)" stroke-width="5" stroke-linejoin="round"/>
          <path d="M30 68V32L50 51L70 32V68" stroke="url(#forgotLogoGoldGrad)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="forgotLogoGoldGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#DFBA6B" />
              <stop offset="100%" stop-color="#B99343" />
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="logo-text-stack font-arabic">
        <span class="logo-title">مَعْلَم</span>
        <span class="logo-subtitle">منصة الحرفيين</span>
      </div>
    </div>

    <h1 class="auth-title font-arabic">استعادة كلمة المرور</h1>
    
    <ng-container *ngIf="!isSuccess">
      <p class="auth-subtitle font-arabic">أدخل بريدك الإلكتروني وسنرسل لك رابطاً لاستعادة كلمة المرور</p>

      <form [formGroup]="forgotPasswordForm" class="auth-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label class="form-label">البريد الإلكتروني *</label>
          <app-input type="email" formControlName="email" placeholder="username@mail.com" [errorMessage]="getEmailError()"></app-input>
        </div>

        <div class="submit-wrap">
          <app-button type="submit" [disabled]="forgotPasswordForm.invalid" [fullWidth]="true">
            إرسال رابط الاستعادة
          </app-button>
        </div>
      </form>
    </ng-container>

    <ng-container *ngIf="isSuccess">
      <div class="success-msg font-arabic">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="success-icon">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <span>تم إرسال رابط الاستعادة بنجاح إلى بريدك الإلكتروني. تفقد صندوق الوارد.</span>
      </div>
    </ng-container>

    <div class="register-prompt font-arabic">
      <a routerLink="/auth/login" class="register-link">العودة لتسجيل الدخول</a>
    </div>

  </div>
</div>
