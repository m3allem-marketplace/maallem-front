<div class="auth-wrapper" dir="rtl">
  <div class="auth-card">

    <div class="logo-container">
      <span class="logo-text">
        M<span class="logo-accent">3</span>allem
      </span>

      <div class="logo-icon-box">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
      </div>
    </div>

    <h1 class="auth-title">استعادة كلمة المرور</h1>
    
    <ng-container *ngIf="!isSuccess">
      <p class="auth-subtitle">أدخل بريدك الإلكتروني وسنرسل لك رابطاً لاستعادة كلمة المرور</p>

      <form [formGroup]="forgotPasswordForm" class="auth-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label class="form-label">البريد الإلكتروني *</label>
          <app-input type="email" formControlName="email" placeholder="username@mail.com"></app-input>
        </div>

        <div class="submit-wrap">
          <app-button type="submit" [disabled]="forgotPasswordForm.invalid" [fullWidth]="true">
            إرسال رابط الاستعادة
          </app-button>
        </div>
      </form>
    </ng-container>

    <ng-container *ngIf="isSuccess">
      <div class="success-msg">
        تم إرسال رابط الاستعادة إلى بريدك الإلكتروني
      </div>
    </ng-container>

    <div class="register-prompt">
      <a routerLink="/auth/login" class="register-link">العودة لتسجيل الدخول</a>
    </div>

  </div>
</div>
