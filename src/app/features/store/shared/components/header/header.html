  <header class="storefront-header">
    <div class="header-top-row">
      <div class="header-content-inner">
        <!-- Title area -->
        <div class="header-title-wrap">
          <span class="store-badge">متجر الخامات ومواد البناء</span>
        </div>

        <!-- Left Actions (Cart only) -->
        <div class="header-actions">
          <div class="cart-btn" (click)="openCart()" id="cart-btn" aria-label="سلة التسوق">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="cart-icon">
              <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            <span class="cart-badge" *ngIf="(cartCount$ | async) as count">{{ count }}</span>
            <span class="cart-badge zero" *ngIf="!(cartCount$ | async)">0</span>
          </div>
        </div>
      </div>
    </div>
  </header>
